# Netlify Configuration for Supriya Water Technology
# Primary Domain: supriyawater.com.np

[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

# Build settings
[build.environment]
  NODE_VERSION = "18"

# Headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
# Cache CSS and JS for 1 year
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 1 year
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Force HTTPS redirect
[[redirects]]
  from = "http://supriyawater.com.np/*"
  to = "https://supriyawater.com.np/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.supriyawater.com.np/*"
  to = "https://supriyawater.com.np/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.supriyawater.com.np/*"
  to = "https://supriyawater.com.np/:splat"
  status = 301
  force = true

# Redirect netlify subdomain to primary domain
[[redirects]]
  from = "https://supriyawater.netlify.app/*"
  to = "https://supriyawater.com.np/:splat"
  status = 301
  force = true

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
