# Netlify Configuration for Maximum SEO Performance
# Optimized for search engine ranking

[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

# Custom headers for SEO and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers (already in _headers, but duplicated for safety)
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    
    # Performance headers for faster loading (better SEO)
    Cache-Control = "public, max-age=31536000, immutable"
    
# HTML pages - no cache (for dynamic content)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images - long cache (faster loading)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS/JS - long cache
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect rules for SEO
[[redirects]]
  from = "/home"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/index"
  to = "/"
  status = 301
  force = true

# 404 handling
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Prerender configuration for better crawling
[build.environment]
  NODE_VERSION = "18"

# Performance optimizations
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
